<!DOCTYPE html> <html lang="en"> <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Checkout</title>  <link rel="stylesheet" href="style.css">  </head> <body>  <section class="hero">  <h1>Checkout Payment 💳</h1>  <br>  <select id="payment-method" class="search-bar">  <option> ShopeePay </option>  <option> DANA </option>  <option> OVO </option>  <option> Bank Transfer </option>  </select>  <br><br>  <button onclick="confirmPayment()">  Confirm Payment  </button>  </section>  <script>  function confirmPayment(){  let cart = JSON.parse(localStorage.getItem("cart")) || [];  let orders = JSON.parse(localStorage.getItem("orders")) || [];  cart.forEach((product) => {  product.status = "Pending 📦";  orders.push(product);  });  localStorage.setItem( "orders", JSON.stringify(orders) );  localStorage.removeItem("cart");  window.location.href = "success.html";  }  </script>  </body> </html>
