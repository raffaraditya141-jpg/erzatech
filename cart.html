<!DOCTYPE html> <html lang="en"> <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Cart - ErzaTech</title>  <link rel="stylesheet" href="style.css">  </head> <body>  <header>  <h1>Your Cart 🛒</h1>  </header>  <section class="products" id="cart-items">  </section>  <div style=" text-align:center; margin-bottom:30px; ">  <h2 id="total-price">  Total: Rp 0  </h2>  <br>  <button onclick="clearCart()">  Clear Cart  </button>  <br><br>  <button onclick="checkout()">  Checkout  </button>  </div>  <script>  let cart = JSON.parse(localStorage.getItem("cart")) || [];  let cartContainer = document.getElementById("cart-items");  let total = 0;  function convertPrice(price){  return Number( price.replace(/[^0-9]/g, "") );  }  function displayCart(){  cartContainer.innerHTML = "";  total = 0;  cart.forEach((product, index) => {  total += convertPrice(product.price);  cartContainer.innerHTML += `  <div class="card">  <img src="${product.image}" style=" width:100%; height:200px; object-fit:cover; ">  <h3>${product.name}</h3>  <p>${product.price}</p>  <button onclick="removeProduct(${index})">  Remove  </button>  </div>  `;  });  document.getElementById("total-price") .innerText = "Total: Rp " + total.toLocaleString("id-ID");  }  function removeProduct(index){  cart.splice(index, 1);  localStorage.setItem( "cart", JSON.stringify(cart) );  displayCart();  }  function clearCart(){  localStorage.removeItem("cart");  cart = [];  displayCart();  }  function checkout(){  window.location.href = "checkout.html";  }  displayCart();  </script>  </body> </html>
