<!DOCTYPE html> <html lang="en"> <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Admin Dashboard</title>  <link rel="stylesheet" href="style.css">  <style>  .stats{  display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:20px;  }  .stat-box{  background:white; padding:20px; border-radius:15px; width:220px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.2);  }  .order-section{  padding:30px;  }  .order-card{  background:white; padding:20px; margin-bottom:20px; border-radius:15px; box-shadow:0 0 10px rgba(0,0,0,0.2);  }  .order-card img{  width:100%; height:200px; object-fit:cover; border-radius:10px;  }  .status-pending{  color:orange; font-weight:bold;  }  .status-shipped{  color:green; font-weight:bold;  }  </style>  </head> <body>  <nav>  <h1>ErzaTech Admin</h1>  <ul>  <li><a href="index.html">Home</a></li>  <li><a href="products.html">Products</a></li>  <li><a href="cart.html">Cart</a></li>  </ul>  </nav>  <section class="hero">  <h1>Admin Dashboard 🔥</h1>  <p> Manage store orders and activities </p>  </section>  <section class="stats">  <div class="stat-box">  <h2 id="total-orders"> 0 </h2>  <p>Total Orders</p>  </div>  <div class="stat-box">  <h2 id="pending-orders"> 0 </h2>  <p>Pending Orders</p>  </div>  <div class="stat-box">  <h2 id="shipped-orders"> 0 </h2>  <p>Shipped Orders</p>  </div>  <div class="stat-box">  <h2 id="total-revenue"> Rp 0 </h2>  <p>Total Revenue</p>  </div>  </section>  <section class="order-section">  <h2>Recent Orders 📦</h2>  <br>  <div id="orders-container">  </div>  <br>  <button onclick="logoutAdmin()">  Logout Admin  </button>  </section>  <script>  let orders = JSON.parse(localStorage.getItem("orders")) || [];  let container = document.getElementById("orders-container");  let totalRevenue = 0;  let pending = 0;  let shipped = 0;  document.getElementById("total-orders") .innerText = orders.length;  if(orders.length === 0){  container.innerHTML = "<p>No Orders Yet</p>";  }else{  orders.forEach((product, index) => {  let price = Number( product.price.replace(/[^0-9]/g, "") );  totalRevenue += price;  if(product.status === "Pending 📦"){  pending++;  }else{  shipped++;  }  container.innerHTML += `  <div class="order-card">  <img src="${product.image}">  <h3>${product.name}</h3>  <p>${product.price}</p>  <p class="${ product.status === 'Pending 📦' ? 'status-pending' : 'status-shipped' }">  ${product.status}  </p>  <button onclick="shipOrder(${index})">  Ship Order 🚚  </button>  </div>  `;  });  }  document.getElementById("pending-orders") .innerText = pending;  document.getElementById("shipped-orders") .innerText = shipped;  document.getElementById("total-revenue") .innerText = "Rp " + totalRevenue.toLocaleString("id-ID");  function shipOrder(index){  orders[index].status = "Shipped ✅";  localStorage.setItem( "orders", JSON.stringify(orders) );  location.reload();  }  function logoutAdmin(){  localStorage.removeItem("loggedInUser");  window.location.href = "login.html";  }  </script>  </body> </html>
