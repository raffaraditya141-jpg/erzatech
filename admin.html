<!DOCTYPE html> <html> <head>   <title>Admin Dashboard</title>    <style>     body {       font-family: Arial;       background: #f4f4f4;       padding: 20px;     }      .box {       background: white;       padding: 15px;       border-radius: 10px;       max-width: 500px;       margin-bottom: 20px;     }      input {       width: 100%;       padding: 10px;       margin: 5px 0;     }      button {       padding: 8px 10px;       margin: 3px;       cursor: pointer;     }      .item {       background: white;       padding: 10px;       margin: 10px 0;       border-radius: 8px;     }      .btn-add { background: green; color: white; }     .btn-del { background: red; color: white; }   </style> </head>  <body>    <h2>🛠 Admin Dashboard Stok</h2>    <div class="box">     <input id="nama" placeholder="Nama barang">     <input id="stok" type="number" placeholder="Stok">     <button class="btn-add" onclick="tambahBarang()">Tambah</button>   </div>    <div id="list"></div>  <script> function getData(){   return JSON.parse(localStorage.getItem("barang")) || []; }  function saveData(data){   localStorage.setItem("barang", JSON.stringify(data)); }  function tampil(){   let data = getData();   let html = "";    data.forEach((item,i)=>{     html += `       <div class="item">         <b>${item.nama}</b><br>         Stok: ${item.stok}<br><br>          <button onclick="tambahStok(${i})">+</button>         <button onclick="kurangStok(${i})">-</button>         <button class="btn-del" onclick="hapus(${i})">hapus</button>       </div>     `;   });    document.getElementById("list").innerHTML = html; }  function tambahBarang(){   let nama = document.getElementById("nama").value;   let stok = parseInt(document.getElementById("stok").value);    if(!nama || isNaN(stok)) return alert("Isi benar!");    let data = getData();   data.push({nama, stok});   saveData(data);   tampil(); }  function tambahStok(i){   let data = getData();   data[i].stok++;   saveData(data);   tampil(); }  function kurangStok(i){   let data = getData();   if(data[i].stok > 0) data[i].stok--;   saveData(data);   tampil(); }  function hapus(i){   let data = getData();   data.splice(i,1);   saveData(data);   tampil(); }  tampil(); </script>  </body> </html>
