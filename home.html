<!DOCTYPE html> <html> <head>   <title>Toko Online</title>    <style>     body {       font-family: Arial;        /* BACKGROUND GAMBAR */       background-image: url('bg.jpg');       background-size: cover;       background-position: center;       background-repeat: no-repeat;       background-attachment: fixed;        padding: 20px;     }      h2 {       color: white;       text-shadow: 2px 2px 5px black;     }      .grid {       display: grid;       grid-template-columns: repeat(2, 1fr);       gap: 10px;     }      .card {       background: rgba(255,255,255,0.95);       padding: 10px;       border-radius: 10px;       cursor: pointer;       box-shadow: 0 2px 5px rgba(0,0,0,0.3);     }      .card img {       width: 100%;       border-radius: 10px;     }      button {       background: #007bff;       color: white;       border: none;       padding: 8px;       width: 100%;       margin-top: 10px;       border-radius: 5px;       cursor: pointer;     }      button:disabled {       background: gray;     }      /* POPUP */     .popup {       display: none;       position: fixed;       top: 0;       left: 0;        width: 100%;       height: 100%;        background: rgba(0,0,0,0.6);        justify-content: center;       align-items: center;     }      .popup-content {       background: white;       padding: 15px;       width: 80%;       border-radius: 10px;     }      .close {       float: right;       font-size: 20px;       cursor: pointer;     }      .review {       background: #eee;       padding: 5px;       margin-top: 5px;       border-radius: 5px;     }   </style> </head>  <body>  <h2>🛒 Produk Toko</h2>  <div class="grid" id="produk"></div>  <!-- POPUP --> <div class="popup" id="popup">    <div class="popup-content">      <span class="close" onclick="tutupPopup()">✖</span>      <img id="pImg" style="width:100%; border-radius:10px;">      <h3 id="pName"></h3>      <p id="pDesc"></p>      <h4>⭐ Review</h4>      <div id="pReview"></div>    </div>  </div>  <script>  function getData(){   return JSON.parse(localStorage.getItem("barang")) || []; }  function saveData(data){   localStorage.setItem("barang", JSON.stringify(data)); }  function tampil(){    let data = getData();    let html = "";    data.forEach((item,i)=>{      let disabled = item.stok <= 0 ? "disabled" : "";      html += `       <div class="card" onclick="bukaPopup(${i})">          <img src="${item.img || 'https://via.placeholder.com/200'}">          <b>${item.nama}</b>          <p>Stok: ${item.stok}</p>          <button ${disabled}           onclick="event.stopPropagation(); beli(${i})">            ${item.stok <= 0 ? "Habis" : "Beli"}          </button>        </div>     `;   });    document.getElementById("produk").innerHTML = html; }  function beli(i){    let data = getData();    if(data[i].stok > 0){      data[i].stok--;      alert("Berhasil beli " + data[i].nama);   }    saveData(data);    tampil(); }  function bukaPopup(i){    let data = getData();    let item = data[i];    document.getElementById("pImg").src =     item.img || 'https://via.placeholder.com/200';    document.getElementById("pName").innerText =     item.nama;    document.getElementById("pDesc").innerText =     item.desc || "Belum ada deskripsi";    document.getElementById("pReview").innerHTML = `     <div class="review">⭐ Barang bagus banget</div>     <div class="review">⭐ Worth it</div>     <div class="review">⭐ Pengiriman cepat</div>   `;    document.getElementById("popup").style.display =     "flex"; }  function tutupPopup(){    document.getElementById("popup").style.display =     "none"; }  tampil();  </script>  </body> </html>
