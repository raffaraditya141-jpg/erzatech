<!DOCTYPE html> <html lang="en"> <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Products - ErzaTech</title>  <link rel="stylesheet" href="style.css">  </head> <body>  <nav>  <h1>ErzaTech</h1>  <ul>  <li><a href="index.html">Home</a></li>  <li><a href="products.html">Products</a></li>  <li><a href="cart.html">Cart 🛒</a></li>  <li><a href="contact.html">Contact</a></li>  </ul>  </nav>  <section class="hero">  <h2>Our Products 🔥</h2>  <br>  <input type="text" id="searchInput" placeholder="Search Product..." class="search-bar">  </section>  <div class="category-buttons">  <button onclick="filterProducts('all')"> All Category </button>  <button onclick="filterProducts('network')"> Networking </button>  <button onclick="filterProducts('gaming')"> Gaming </button>  <button onclick="filterProducts('storage')"> Storage </button>  </div>  <section class="products" id="product-container">  </section>  <script>  let products = [  { name:"WiFi Router", price:"Rp 350.000", image:"images/router.jpg", category:"network" },  { name:"MikroTik Router", price:"Rp 900.000", image:"images/mikrotik.jpg", category:"network" },  { name:"LAN Cable", price:"Rp 25.000", image:"images/lan.jpg", category:"network" },  { name:"Switch Hub", price:"Rp 450.000", image:"images/switch.jpg", category:"network" },  { name:"RJ45 Connector", price:"Rp 15.000", image:"images/rj45.jpg", category:"network" },  { name:"Access Point", price:"Rp 650.000", image:"images/accesspoint.jpg", category:"network" },  { name:"Gaming Keyboard", price:"Rp 250.000", image:"images/keyboard.jpg", category:"gaming" },  { name:"Gaming Mouse", price:"Rp 150.000", image:"images/mouse.jpg", category:"gaming" },  { name:"Gaming Headset", price:"Rp 350.000", image:"images/headset.jpg", category:"gaming" },  { name:"Monitor", price:"Rp 1.500.000", image:"images/monitor.jpg", category:"gaming" },  { name:"SSD Storage", price:"Rp 700.000", image:"images/ssd.jpg", category:"storage" },  { name:"Power Supply", price:"Rp 300.000", image:"images/powersupply.jpg", category:"storage" },  { name:"Modem", price:"Rp 400.000", image:"images/modem.jpg", category:"storage" },  { name:"CCTV Camera", price:"Rp 800.000", image:"images/cctv.jpg", category:"storage" },  { name:"Network Adapter", price:"Rp 200.000", image:"images/adapter.jpg", category:"storage" }  ];  let container = document.getElementById( "product-container" );  function displayProducts(data){  container.innerHTML = "";  data.forEach((product) => {  container.innerHTML += `  <div class="card">  <img src="${product.image}">  <h3>${product.name}</h3>  <p>${product.price}</p>  <button onclick='addToCart( "${product.name}", "${product.price}", "${product.image}" )'>  Buy Now  </button>  </div>  `;  });  }  displayProducts(products);  function filterProducts(category){  if(category === "all"){  displayProducts(products);  }else{  let filtered = products.filter(product =>  product.category === category  );  displayProducts(filtered);  }  }  document.getElementById( "searchInput" ).addEventListener("keyup", function(){  let keyword = this.value.toLowerCase();  let filtered = products.filter(product =>  product.name .toLowerCase() .includes(keyword)  );  displayProducts(filtered);  });  function addToCart(name, price, image){  let cart = JSON.parse( localStorage.getItem("cart") ) || [];  cart.push({ name, price, image });  localStorage.setItem( "cart", JSON.stringify(cart) );  alert(name + " added to cart 🛒");  }  </script>  </body> </html>
