<!DOCTYPE html> <html lang="en"> <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Login - ErzaTech</title>  <link rel="stylesheet" href="style.css">  </head> <body>  <header>  <h1>Login Account 🔐</h1>  </header>  <section class="hero">  <input type="text" id="username" placeholder="Enter Username" class="search-bar">  <br><br>  <input type="password" id="password" placeholder="Enter Password" class="search-bar">  <br><br>  <button onclick="login()">  Login  </button>  <br><br>  <p id="message"></p>  </section>  <script>  function login(){  let username = document.getElementById("username").value;  let password = document.getElementById("password").value;  if( username === "admin" && password === "admin123" ){  localStorage.setItem( "loggedInUser", username );  let speech = new SpeechSynthesisUtterance( "Selamat datang admin" );  speech.lang = "id-ID";  window.speechSynthesis.speak(speech);  setTimeout(() => {  window.location.href = "admin.html";  }, 2000);  }else{  localStorage.setItem( "loggedInUser", username );  let speech = new SpeechSynthesisUtterance( "Selamat datang " + username );  speech.lang = "id-ID";  window.speechSynthesis.speak(speech);  setTimeout(() => {  window.location.href = "index.html";  }, 2000);  }  }  </script>  </body> </html>
